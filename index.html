<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Notproscript</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background: linear-gradient(135deg,#000000,#001a33,#000814,#000000);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

canvas{
position:fixed;
top:0;
left:0;
}

.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:1;
padding:40px;
background:#111;
text-align:center;
border-radius:20px;
box-shadow:0 0 25px red;
width:350px;
}

h1{
color:red;
}

/* H2 đẹp hơn */

h2{
font-size:16px;
margin:15px 0;
font-weight:bold;
background: linear-gradient(90deg,#ff0000,#ff6600,#ff0000);
background-size:200% auto;
color:transparent;
background-clip:text;
-webkit-background-clip:text;
animation:textMove 4s linear infinite;
text-shadow:0 0 10px rgba(255,0,0,0.6);
}

@keyframes textMove{
0%{background-position:0%;}
100%{background-position:200%;}
}

button{
display:block;
width:200px;
margin:10px auto;
padding:12px;
border:none;
border-radius:10px;
background:#8b0000;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:red;
box-shadow:0 0 15px red;
}

/* VIP BUTTON MỚI */

.vip{
background: linear-gradient(120deg,#ffd700,#ffb300,#ffd700);
background-size:200% 200%;
color:#000;
font-weight:bold;
position:relative;
overflow:hidden;
border:2px solid gold;
animation:vipMove 3s linear infinite;
}

@keyframes vipMove{
0%{background-position:0% 50%;}
100%{background-position:200% 50%;}
}

/* ánh sáng quét */

.vip::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.8),transparent);
transition:0.5s;
}

.vip:hover::before{
left:100%;
}

.vip:hover{
transform:scale(1.12);
box-shadow:0 0 20px gold,0 0 40px orange;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">

<h2>Còn dưới đây dành cho những bạn đã có key (lưu ý : ở đây chỉ gửi script)</h2>

<button class="vip" onclick="openPage('verify.html?page=banana.html')">💎 Banana Hub</button>

</div>

<script>

function openPage(page){
window.location.href = page;
}

/* PARTICLE BACKGROUND */

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3+1,
speed:Math.random()*1+0.2
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff0000";
ctx.shadowColor="red";
ctx.shadowBlur=10;

for(let i=0;i<particles.length;i++){

let p=particles[i];

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y+=p.speed;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}

}

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
