<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đang xác minh...</title>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(135deg,#000000,#001a33,#000814);
font-family:Arial;
color:white;
text-align:center;
}

/* canvas background */

canvas{
position:fixed;
top:0;
left:0;
}

/* verify box */

.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:40px;
width:320px;
border-radius:20px;
box-shadow:0 0 30px red;
z-index:1;
}

/* progress bar */

.bar{
width:100%;
height:12px;
background:#222;
border-radius:20px;
margin-top:20px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:red;
transition:width 1s;
}

/* button */

button{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:10px;
background:red;
color:white;
cursor:pointer;
display:none;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 15px red;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">

<h2>🔐 Đang xác minh...</h2>

<p>Vui lòng đợi <span id="time">10</span> giây</p>

<div class="bar">
<div class="progress" id="progress"></div>
</div>

<button id="continueBtn">Tiếp tục</button>

</div>

<script>

/* GET PAGE */

let params = new URLSearchParams(window.location.search);
let page = params.get("page");

/* TIMER */

let time = 10;

let timer = setInterval(function(){

time--;

document.getElementById("time").innerText = time;

let percent = (10 - time) * 10;
document.getElementById("progress").style.width = percent + "%";

if(time <= 0){

clearInterval(timer);

document.getElementById("continueBtn").style.display="block";

}

},1000);

document.getElementById("continueBtn").onclick=function(){

window.location.href = page;

}

/* PARTICLE BACKGROUND */

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

let particles=[];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3+1,
speed:Math.random()*1+0.3
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="red";
ctx.shadowColor="red";
ctx.shadowBlur=10;

for(let i=0;i<particles.length;i++){

let p=particles[i];

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y+=p.speed;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}

}

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
