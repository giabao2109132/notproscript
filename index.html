body{

0%{background-position:0% 50%;}
100%{background-position:100% 50%;}

canvas{

.box{

margin:120px auto;
padding:40px;

text-align:center;
border-radius:20px;
width:350px;

@keyframes textMove{

<script>

function openPage(page){
window.location.href = page;
}

/* CANVAS */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

const matrix=document.getElementById("matrix");
const mtx=matrix.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
matrix.width=window.innerWidth;
matrix.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

/* PARTICLE NETWORK AI */

let particles=[];
let hue=0;

for(let i=0;i<130;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3+1,
speedX:(Math.random()-0.5)*0.7,
speedY:(Math.random()-0.5)*0.7
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

hue+=0.5;

for(let i=0;i<particles.length;i++){

let p=particles[i];

ctx.fillStyle="hsl("+hue+",100%,60%)";
ctx.shadowColor="hsl("+hue+",100%,60%)";
ctx.shadowBlur=15;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.x+=p.speedX;
p.y+=p.speedY;

if(p.x<0 || p.x>canvas.width) p.speedX*=-1;
if(p.y<0 || p.y>canvas.height) p.speedY*=-1;

}

/* NETWORK LINK */

for(let a=0;a<particles.length;a++){
for(let b=a+1;b<particles.length;b++){

let dx=particles[a].x-particles[b].x;
let dy=particles[a].y-particles[b].y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<110){

let alpha=1-(dist/110);

ctx.strokeStyle="hsla("+hue+",100%,60%,"+alpha+")";
ctx.lineWidth=1.5;

ctx.shadowColor="hsl("+hue+",100%,60%)";
ctx.shadowBlur=10;

ctx.beginPath();
ctx.moveTo(particles[a].x,particles[a].y);
ctx.lineTo(particles[b].x,particles[b].y);
ctx.stroke();

}

}
}

requestAnimationFrame(animate);

}

animate();

/* MATRIX EFFECT */

const letters="01YESEVBTPN+-#*/$VNVODICH!&^%NOTPROSCRIPT";
const fontSize=16;
const columns=matrix.width/fontSize;
const drops=[];

for(let x=0;x<columns;x++){
drops[x]=1;
}

function drawMatrix(){

mtx.fillStyle="rgba(0,0,0,0.05)";
mtx.fillRect(0,0,matrix.width,matrix.height);

mtx.fillStyle="#00ff00";
mtx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

mtx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>matrix.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(drawMatrix,35);

</script>
